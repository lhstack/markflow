# MarkFlow backend config
# Place this file next to markflow.exe
# Environment variables override file values

# Application
port = "3000"
database_url = "sqlite:markflow.db"
jwt_secret = "change_me_to_a_long_random_string_in_production"
share_password_secret = "change_me_to_a_long_random_string_for_share_password_encryption"
rust_log = "markflow=info,tower_http=warn"

# Upload root directory (relative to working dir or absolute path)
upload_dir = "uploads"

# Whether new user registration is enabled
registration_enabled = true

# Maximum upload size per file (MB)
upload_max_mb = 20

# Logging file output
# Enable file logging: true/false
log_to_file = true

# Log file directory (relative to working dir or absolute path)
log_dir = "logs"

# Active log file name
log_file_name = "markflow.log"

# Rotate when file size exceeds this value (MB)
log_rotate_size_mb = 50

# Rotate when file age reaches this many days
log_rotate_days = 1

# Keep rotated logs for this many days (<=0 means keep forever)
log_keep_days = 14
